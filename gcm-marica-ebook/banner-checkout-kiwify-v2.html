<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Checkout v2 — GCM Maricá</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #555;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  .banner {
    width: 2000px;
    height: 590px;
    background: #F5F0E8;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Textura de fundo — gradiente creme com aquecimento central */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 90% at 50% 50%, #EDE6D5 0%, #F5F0E8 55%, #EAE3D2 100%),
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,169,81,.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(200,169,81,.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Faixa azul-marinho superior */
  .faixa-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 10px;
    background: #0D1F3C;
  }
  /* Linha dourada abaixo da faixa azul */
  .faixa-top::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #C8A951 15%, #E8C96A 50%, #C8A951 85%, transparent 100%);
  }

  /* Faixa azul-marinho inferior */
  .faixa-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 10px;
    background: #0D1F3C;
  }
  .faixa-bottom::before {
    content: '';
    position: absolute;
    top: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #C8A951 15%, #E8C96A 50%, #C8A951 85%, transparent 100%);
  }

  /* Ornamentos laterais — escudo SVG sutil azul */
  .ornamento-esq,
  .ornamento-dir {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    opacity: .12;
  }
  .ornamento-esq { left: 50px; }
  .ornamento-dir { right: 50px; }

  /* Conteúdo central */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0 240px;
  }

  /* Logo */
  .logo-wrap {
    margin-bottom: 26px;
  }
  .logo-wrap img {
    width: 118px;
    height: 118px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 2px 10px rgba(13,31,60,.18));
  }

  /* Divisor heráldico */
  .divisor {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
  }
  .divisor-linha {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #0D1F3C);
  }
  .divisor-linha.rev {
    background: linear-gradient(90deg, #0D1F3C, transparent);
  }
  .divisor-ornamento {
    width: 7px;
    height: 7px;
    background: #0D1F3C;
    transform: rotate(45deg);
    flex-shrink: 0;
  }
  .divisor-ornamento.dourado {
    background: #C8A951;
    transform: rotate(45deg) scale(.65);
    opacity: .8;
  }

  /* Texto principal */
  .headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 56px;
    font-weight: 700;
    color: #0D1F3C;
    line-height: 1.15;
    text-align: center;
    letter-spacing: .01em;
  }
  .headline em {
    font-style: italic;
    color: #1A3A6B;
  }

  /* Ornamento entre as frases */
  .linha-meio {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px auto;
  }
  .linha-meio-traço {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C8A951);
  }
  .linha-meio-traço.rev {
    background: linear-gradient(90deg, #C8A951, transparent);
  }
  .linha-meio-ponto {
    width: 6px;
    height: 6px;
    background: #C8A951;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Subtexto */
  .subtexto {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 30px;
    font-weight: 400;
    font-style: italic;
    color: #4A4640;
    text-align: center;
    letter-spacing: .02em;
    line-height: 1.4;
  }

  /* Divisor inferior */
  .divisor-baixo {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 30px;
  }
</style>
</head>
<body>

<div class="banner">

  <!-- Faixas azuis topo e base -->
  <div class="faixa-top"></div>
  <div class="faixa-bottom"></div>

  <!-- Ornamentos laterais — escudo em azul-marinho sutil -->
  <div class="ornamento-esq">
    <svg viewBox="0 0 100 140" width="100" height="140" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 6 L86 22 L86 76 Q86 112 50 130 Q14 112 14 76 L14 22 Z"
            fill="#0D1F3C" stroke="#0D1F3C" stroke-width="2"/>
      <path d="M50 14 L79 28 L79 76 Q79 108 50 124 Q21 108 21 76 L21 28 Z"
            fill="none" stroke="#C8A951" stroke-width="1.2"/>
      <polygon points="50,28 55,44 72,44 59,54 64,70 50,60 36,70 41,54 28,44 45,44"
               fill="#C8A951"/>
    </svg>
  </div>
  <div class="ornamento-dir">
    <svg viewBox="0 0 100 140" width="100" height="140" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 6 L86 22 L86 76 Q86 112 50 130 Q14 112 14 76 L14 22 Z"
            fill="#0D1F3C" stroke="#0D1F3C" stroke-width="2"/>
      <path d="M50 14 L79 28 L79 76 Q79 108 50 124 Q21 108 21 76 L21 28 Z"
            fill="none" stroke="#C8A951" stroke-width="1.2"/>
      <polygon points="50,28 55,44 72,44 59,54 64,70 50,60 36,70 41,54 28,44 45,44"
               fill="#C8A951"/>
    </svg>
  </div>

  <!-- Conteúdo central -->
  <div class="content">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="BRAFDFDFDSOES-LANDING-PAGE-1024x1024.png" alt="GCM Maricá — Guarda Municipal">
    </div>

    <!-- Divisor heráldico superior -->
    <div class="divisor">
      <div class="divisor-linha"></div>
      <div class="divisor-ornamento"></div>
      <div class="divisor-ornamento dourado"></div>
      <div class="divisor-ornamento"></div>
      <div class="divisor-linha rev"></div>
    </div>

    <!-- Texto principal -->
    <div class="headline">
      Este material já é <em>quase seu!</em>
    </div>

    <!-- Separador central -->
    <div class="linha-meio">
      <div class="linha-meio-traço rev"></div>
      <div class="linha-meio-ponto"></div>
      <div class="linha-meio-ponto" style="background:#0D1F3C;opacity:.4;transform:scale(.7);"></div>
      <div class="linha-meio-ponto"></div>
      <div class="linha-meio-traço"></div>
    </div>

    <!-- Subtexto -->
    <div class="subtexto">
      Preencha seus dados no campo abaixo para liberar o seu acesso.
    </div>

    <!-- Divisor heráldico inferior -->
    <div class="divisor-baixo">
      <div class="divisor-linha"></div>
      <div class="divisor-ornamento"></div>
      <div class="divisor-ornamento dourado"></div>
      <div class="divisor-ornamento"></div>
      <div class="divisor-linha rev"></div>
    </div>

  </div>

</div>

</body>
</html>
